<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vinyl Archive 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        :root { --paper: #fdf8ef; --nav-bg: #1a1a1a; --vintage-dark: #2c2c2c; }
        
        body { 
            font-family: 'Courier Prime', monospace; 
            background-color: #000; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-container { 
            width: 100%; max-width: none; height: 100vh; 
            background-color: var(--paper); border: none; border-radius: 0; 
            position: relative; overflow: hidden; display: flex; flex-direction: column; 
        }
        
        * { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            -webkit-tap-highlight-color: transparent; 
        }
        *::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }

        textarea, input {
            -webkit-user-select: text !important;
            user-select: text !important;
        }

        #toast-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3000; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
        .toast { background: rgba(0, 0, 0, 0.9); color: #fff; padding: 16px 28px; border-radius: 10px; font-size: 12px; font-weight: bold; text-align: center; line-height: 1.5; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(5px); opacity: 0; transform: scale(0.9); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast.show { opacity: 1; transform: scale(1); }

        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 450; display: none; pointer-events: auto; }
        .modal-overlay.active { display: block; }

        #gatcha-canvas-container { transition: filter 0.5s ease; }
        .gatcha-active #gatcha-canvas-container { filter: blur(20px); }
        #gatcha-blur-bg { position: absolute; inset: 0; bottom: 0; z-index: 60; background: rgba(253, 248, 239, 0); transition: all 0.5s ease; pointer-events: none; }
        .gatcha-active #gatcha-blur-bg { background: rgba(253, 248, 239, 0.4); pointer-events: auto; }

        .tab-view { display: none; flex: 1; width: 100%; height: calc(100% - 100px); position: absolute; top: 80px; left: 0; padding: 20px; overflow-y: scroll; z-index: 50; }
        .tab-view.active { display: flex; flex-direction: column; }
        #nav-menu {display:none;}
        #nav-menu.show {display: flex !important;}
        .write-btn-container { display: flex; justify-content: center; gap : 16px; margin-top: 40px; margin-bottom: 80px; }
        #view-album { padding: 0; overflow: hidden; }
        .album-content-wrapper { position: relative; width: 100%; height: 100vh !important; overflowL hidden; }

        #timeline-view { position: absolute; top :80px; left:0; right:0;bottom: 100px !important; height: auto !important;background: var(--paper); z-index: 10; padding: 20px; 
                        padding-bottom: 40px; display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: min-content; gap: 8px; overflow-y: auto; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .timeline-card { overflow: hidden; cursor: pointer; background: #fff; position: relative; border-radius: 0; transition: transform 0.1s; user-select: none; -webkit-touch-callout: none; }
        .size-normal { grid-column: span 1; aspect-ratio: 1 / 1; }
        .size-large { grid-column: span 2; grid-row: span 2; aspect-ratio: 1 / 1; }

        .popup-base { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 500; background: var(--paper); padding: 25px; border: 2px solid #000; width: 350px; max-height: 550px; display: none; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); flex-direction: column; }
        #info-popup{z-index: 2000 !important;}
        #month-list-popup{z-index: 1000 !important;}
        #settings-popup, #result-popup{z-index: 500;}
        .popup-base img, #info-image {border: none !important; box-shadow: none !important; outline: none !important;}
        .show { display: flex !important; }
        .auto-scroll { flex: 1; overflow-y: auto; padding-right: 5px; margin-top: 10px; }

        .nav-bar { height: 100px; background: var(--nav-bg); display: flex; justify-content: space-around; align-items: center; z-index: 300; position: absolute; bottom: 0; width: 100%; }
        .lp-circle { width: 46px; height: 46px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; border: 1px solid #333; color: white; -webkit-touch-callout: none; }
        .tab-btn.active .lp-circle { background: radial-gradient(circle, #fff 20%, transparent 21%), repeating-radial-gradient(circle, #ddd 0, #ddd 1px, #fff 2px, #fff 3px); border: 1px solid #fff; color: black; }
        
        .animate-spin-slow { animation: spin 12s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .stream-container { background-color: transparent !important; padding : 12px; padding-top: env(safe-area-inset-top, 10px); padding-bottom: calc(100px + env(safe-area-inset-bottom)); position: absolute; top: 0; left: 0; width: 100%; height: 100%;  display: flex; flex-direction: column; justify-content: flex-start; gap: 15px; z-index: 600; transform: translateY(-100%); transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden !important; }
        .stream-content-card{ background-color: #ffffff; border-radius: 24px; padding: 10px 15px; height: 100%; display: flex; flex-direction: column; justify-content: space-between;}
        
        .stream-year-title { font-size: 24px; font-weight: 900; color: #000; margin-bottom: 10px; letter-spacing: -1.5px; padding-left: 5px; }
        .stream-container.slide-down { transform: translateY(0) !important; }
        .timeline-up { transform: translateY(-110%); }

        .month-row { display: flex; align-items: center; gap: 8px; width: 100%; flex: 1; min-height: 0; }
        .month-box { font-size: 11px; font-weight: 800; width: 45px; height: 80%; max-height: 30px; display: flex; align-items: center; justify-content: center; background: #eee5d5; border-radius: 4px; cursor: pointer; flex-shrink: 0; -webkit-touch-callout: none; }
        .day-grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 2px; flex: 1; height: auto; align-items: center; padding:2px 0; padding-left: 8px; border-left: 1px solid #eee; }
        .day-pixel { aspect-ratio:1 / 1 !important; width: 100%; height: auto !important; background: rgba(0,0,0,0.05); border-radius: 1px; object-fit: cover; }
        .stream-container-slide-down { transform: translateY(0) !important;}
        .pick-badge { position: absolute; top: 0; left: 0; background: #000; color: #fff; font-size: 8px; font-weight: 900; padding: 2px 5px; z-index: 5; letter-spacing: 1px; }
        
        .swipe-hint { position: absolute; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: 900; opacity: 0.2; pointer-events: none; z-index: 30; }
        .hint-down { top: 10px; }
        .hint-up { bottom: 10px; }

        #search-list { max-height: 280px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="app-container" id="main-container">
        <div id="toast-container"></div>
        <div id="modal-overlay" class="modal-overlay"></div>
        <div id="gatcha-blur-bg"></div>
        <div id="gatcha-canvas-container" class="absolute inset-0 pointer-events-none z-10 hidden"></div>

        <div class="app-header h-20 p-6 flex justify-between items-center z-[100] relative">
              <div class="flex items-center gap-2 cursor-pointer" onclick="toggleNav()">
                    <span class="text-[16px] font-bold tracking-[3px] uppercase" id="current-tab-title">WRITE</span>
                    <span class="text-[10px] opacity-30">▼</span>
              </div>
              <div id="nav-menu" class="hidden absolute top-[70px] left-5 bg-white border-2 border-black rounded-2xl flex-col w-44 z-[3000] shadow-xl overflow-hidden">
                   <div class="p-4 font-bold text-[13px] border-b hover:bg-gray-50" onclick="changeTab('write')">✎ WRITE</div>
                   <div class="p-4 font-bold text-[13px] border-b hover:bg-gray-50" onclick="changeTab('album')">▤ ALBUM</div>
                   <div class="p-4 font-bold text-[13px] hover:bg-gray-50" onclick="changeTab('gatcha')">⬙ GATCHA</div>
                </div>
                <div class="text-[11px] font-bold border-2 border-black px-4 py-1 rounded-full bg-white">🪙 <span id="coin-count">0</span></div>
                <button onclick="openSettings()" class="w-7 h-7 flex items-center justify-center bg-white border-2 border-black rounded-full text-[14px] hover:bg-black hover:text-white transition-colors">⁝</button>
            </div>
        </div>

        <div id="view-write" class="tab-view active">
            <div id="top-datetime-display" class="text-center font-bold mb-4 text-[13px] opacity-60"></div>
            <div class="relative w-full mb-6">
                <input type="text" id="search-bar" placeholder="Search music..." class="w-full bg-transparent border-b-2 border-black p-2 outline-none text-[13px] italic">
                <div id="search-list" class="hidden absolute top-full left-0 w-full border-2 border-black bg-white z-[110] rounded-xl shadow-2xl mt-1">
                </div>
            </div>
            <div class="bg-white rounded-[24px] h-[380px] p-6 flex flex-col shadow-inner">
                <div id="stamp-slot" class="mb-4 flex justify-center items-center h-28">
                    <div class="w-24 h-24 border-2 border-dashed border-black/10 rounded-full flex items-center justify-center text-[10px] opacity-20 text-center">SELECT<br>MUSIC</div>
                </div>
                <div id="song-info" class="text-center mb-4">
                    <div id="display-title" class="text-[16px] font-bold uppercase truncate"></div>
                    <div id="display-artist" class="text-[11px] opacity-40 italic truncate"></div>
                </div>
                <textarea id="diary" placeholder="Write down..." class="w-full bg-transparent outline-none resize-none text-[15px] border-t pt-4" style = "height: 450px !important; min-height: 200px; 
                    oninput = "this.style.height = '';this.style.height = this.scrollHeight + 'px'display: block;"></textarea>
            </div>
            <div class="write-btn-container">
                <button onclick="seal()" class="w-5/12 py-3 bg-black text-white rounded-full font-bold text-[11px]">SEAL RECORD</button>
                <button onclick="resetWriteView()" class="w-5/12 py-3 border-2 border-black text-black rounded-full font-bold text-[11px]">RESET</button>
            </div>
        </div>

        <div id="view-album" class="tab-view" style="padding: 0; overflow: hidden; height: 100vh;">
            <div class="px-6 flex justify-between items-center h-20" id="album-header-ui">
                <span id="album-main-title" class="text-[22px] font-black uppercase tracking-tighter">TIMELINE</span>
                <div class="flex items-center gap-3">
    <button onclick="toggleTimeline()" class="text-[9px] font-bold border-2 border-black px-3 py-1 rounded-full bg-white active:bg-black active:text-white transition-colors">
        STREAM
    </button>
</div>
           </div>
    
            <div class="album-content-wrapper" id="swipe-area" style="position: relative; height: calc(100% - 80px); overflow: hidden;">
                <div id="timeline-view" style="height: 100%; overflow-y: auto;"></div>
        
                <div id="static-stream" class="stream-container">
                    <div class = "stream-content-card">
                        <div class ="stream-year-title">2026</div>
                        <div id = "stream-row-container" style = "flex:1; display: flex; flex-direction: column; justify-content: space-between;">
                        </div>
                    </div>    
                </div>
        
                <div class="swipe-hint hint-up" style="bottom: 20px; z-index: 600;">↑ SWIPE UP TO STREAM</div>
            </div>
        </div>

        <div id="view-gatcha" class="tab-view" style="padding:0; overflow:hidden;">
            <div id="gatcha-guide" class="absolute top-20 w-full text-center font-bold text-[12px] tracking-widest z-[70] opacity-0 transition-opacity pointer-events-none">SHAKE & CLICK!</div>
            <div id="gatcha-ui" class="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
                <button id="coin-btn" onclick="startGatchaSession()" class="pointer-events-auto bg-black text-white px-8 py-4 text-[12px] font-bold tracking-[4px] rounded-full mb-[300px] shadow-2xl">⬙ INSERT COIN</button>
            </div>
        </div>

      
        <div id="settings-popup" class="popup-base">
            <h2 class="text-[16px] font-bold text-center pb-3 uppercase tracking-wider border-b-2 border-black/5 mb-6">Settings</h2>
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-center px-2">
                    <span class="text-[12px] font-bold">Storage Management</span>
                    <button onclick="clearArchive()" class="px-4 py-2 bg-red-50 text-red-600 border border-red-200 rounded-lg font-bold text-[10px] hover:bg-red-600 hover:text-white transition-colors">CLEAR ALL DATA</button>
                </div>
            </div>
            <button onclick="closeSettings()" class="w-full py-4 bg-black text-white rounded-full font-bold mt-8">CLOSE</button>
        </div>

        <div id="result-popup" class="popup-base">
            <div class="w-32 h-32 mx-auto mb-4 rounded-full overflow-hidden">
                <div id="res-image" class="w-full h-full bg-cover bg-center animate-spin-slow"></div>
            </div>
            <div id="res-title" class="text-center font-bold uppercase text-[15px] mb-1 truncate px-4"></div>
            <div id="res-artist" class="text-center text-[11px] opacity-40 italic mb-3"></div>
            <div id="res-content" class="auto-scroll text-center text-[12px] opacity-70 italic px-4 mt-2 border-t pt-4"></div>
            <div id="res-datetime" class="text-center mt-6 mb-2 text-[10px] font-bold opacity-30 tracking-widest"></div>
            <button onclick="closeResultPopup()" class="w-full py-4 bg-black text-white rounded-full font-bold">CONFIRM</button>
        </div>

        <div id="info-popup" class="popup-base">
            <div class="flex items-center gap-4 mb-4 border-b pb-4 mt-2">
                <div id="info-image" class="w-20 h-20 bg-cover bg-center rounded-lg"></div>
                <div class="flex-1 min-w-0">
                    <div id="info-title" class="font-bold uppercase text-[15px] truncate"></div>
                    <div id="info-artist" class="text-[11px] opacity-40 italic"></div>
                </div>
            </div>
            <div id="info-history" class="auto-scroll text-[12px]"></div>
            <button onclick="closeInfo()" class="w-full py-4 bg-black text-white rounded-full font-bold mt-4">BACK</button>
        </div>

        <div id="month-list-popup" class="popup-base">
            <h2 id="month-list-title" class="text-[16px] font-bold text-center pb-3 uppercase border-b-2 border-black/5 mb-4"></h2>
            <div id="month-list-content" class="auto-scroll"></div>
            <button onclick="closeMonthList()" class="w-full py-4 bg-black text-white rounded-full font-bold mt-4">CLOSE</button>
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Mouse, MouseConstraint, Body } = Matter;
        let archive = JSON.parse(localStorage.getItem('myArchive')) || [];
        let dailySongs = JSON.parse(localStorage.getItem('dailySongs')) || {};
        let coins = (localStorage.getItem('myCoins') === null) ? 1 : parseInt(localStorage.getItem('myCoins'));

        let currentAudio = new Audio();
        currentAudio.loop = true;
        let engine, runner, render, isGatchaActive = false, isTimelineOpen = false;

        window.oncontextmenu = function(e) { e.preventDefault(); e.stopPropagation(); return false; };

        // 1. iTunes API Search & Response (JSONP)
        function searchMusic() {
            const query = document.getElementById('search-bar').value.trim();
            if (query.length < 2) {
                document.getElementById('search-list').classList.add('hidden');
                return;
            }

            const oldScript = document.getElementById('itunes-script');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'itunes-script';
            script.src = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=5&callback=handleITunesResponse`;
            document.body.appendChild(script);
        }

        window.handleITunesResponse = function(data) {
            const list = document.getElementById('search-list');
            list.innerHTML = "";
            if (data.results && data.results.length > 0) {
                list.classList.remove('hidden');
                data.results.forEach(track => {
                    const div = document.createElement('div');
                    div.className = "p-4 cursor-pointer border-b hover:bg-gray-50 flex items-center gap-3";
                    const artwork = track.artworkUrl100.replace('100x100bb', '400x400bb');
                    div.innerHTML = `
                        <img src="${track.artworkUrl60}" class="w-10 h-10 rounded shadow-sm">
                        <div class="overflow-hidden">
                            <div class="font-bold text-[11px] truncate text-black">${track.trackName}</div>
                            <div class="text-[10px] opacity-40 truncate text-black">${track.artistName}</div>
                        </div>`;
                    div.onclick = () => pickMusic(track.trackName, track.artistName, artwork, track.previewUrl);
                    list.appendChild(div);
                });
            }
        };
        function toggleNav(){ const menu = document.getElementById('nav-menu'); menu.classList.toggle('show');}

        function pickMusic(t, a, i, u) {
            const el = document.getElementById('display-title');
            el.dataset.info = JSON.stringify({ 
                title: t, artist: a, image: i, 
                color: `hsl(${Math.random() * 360}, 50%, 70%)`, 
                url: u 
            });
            el.innerText = t; 
            document.getElementById('display-artist').innerText = a;
            document.getElementById('stamp-slot').innerHTML = `<img src="${i}" class="w-24 h-24 rounded-full animate-spin-slow object-cover">`;
            document.getElementById('search-list').classList.add('hidden');
            document.getElementById('search-bar').value = "";
            currentAudio.src = u; 
            currentAudio.play().catch(() => showToast("미리듣기를 재생할 수 없습니다."));
        }

        // 2. Matter.js Physics & Random Shape Gatcha
        function initGatchaPhysics() {
            if (engine) { Composite.clear(engine.world); Engine.clear(engine); Render.stop(render); Runner.stop(runner); }
            const container = document.getElementById('gatcha-canvas-container');
            container.innerHTML = "";
            const cw = container.clientWidth, ch = container.clientHeight;
            
            engine = Engine.create();
            render = Render.create({ 
                element: container, 
                engine: engine, 
                options: { width: cw, height: ch, background: 'transparent', wireframes: false } 
            });

            const wallOpts = { isStatic: true, render: { visible: false } };
            Composite.add(engine.world, [
                Bodies.rectangle(cw/2, ch-45, cw, 20, wallOpts), 
                Bodies.rectangle(-10, ch/2, 20, ch, wallOpts), 
                Bodies.rectangle(cw+10, ch/2, 20, ch, wallOpts)
            ]);

            const shapes = archive.map(item => {
                const x = Math.random() * (cw - 60) + 30;
                const type = Math.floor(Math.random() * 3); // 0:Circle, 1:Box, 2:Triangle
                const opts = { restitution: 0.6, render: { fillStyle: item.color || '#000' }, label: "item" };
                let body;
                if(type === 0) body = Bodies.circle(x, -100, 20, opts);
                else if(type === 1) body = Bodies.rectangle(x, -100, 40, 40, opts);
                else body = Bodies.polygon(x, -100, 3, 25, opts);
                
                body.songData = item;
                return body;
            });
            Composite.add(engine.world, shapes);

            const mouse = Mouse.create(render.canvas);
            const mouseConstraint = MouseConstraint.create(engine, { 
                mouse: mouse, 
                constraint: { stiffness: 0.2, render: { visible: false } } 
            });
            
            Events.on(mouseConstraint, 'mousedown', (e) => {
                if(!isGatchaActive || document.querySelector('.popup-base.show')) return;
                const body = e.source.body;
                if(body && body.label === "item") showGatchaResult(body.songData);
            });

            Composite.add(engine.world, mouseConstraint);
            runner = Runner.create(); 
            Runner.run(runner, engine); 
            Render.run(render);
            setupShakeInteraction();
        }

        // 3. System Logic 유지 및 업데이트
        function updateUI() {
            document.getElementById('coin-count').innerText = coins;
            localStorage.setItem('myArchive', JSON.stringify(archive));
            localStorage.setItem('dailySongs', JSON.stringify(dailySongs));
            localStorage.setItem('myCoins', coins);
            renderStaticStream();
            renderTimeline();
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 50);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 1200); 
        }

        function toggleModalOverlay(show) { 
            const overlay = document.getElementById('modal-overlay');
            overlay.classList.toggle('active', show); 
        }

        function openSettings() { toggleModalOverlay(true); document.getElementById('settings-popup').classList.add('show'); }
        function closeSettings() { document.getElementById('settings-popup').classList.remove('show'); toggleModalOverlay(false); }
        function clearArchive() { if(confirm("초기화하시겠습니까?")) { localStorage.clear(); location.reload(); } }
        
function changeTab(t) {
    // 1. 팝업이 열려있거나 갓챠가 진행 중이면 이동 차단
    if(document.querySelector('.popup-base.show')) return;
    if(isGatchaActive) { 
        showToast("먼저 갓챠를 완료해주세요!"); 
        return; 
    }

    currentAudio.pause();

    // 2. 모든 탭 뷰 숨기기 및 선택한 탭 활성화
    document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
    const targetView = document.getElementById('view-' + t);
    if (targetView) targetView.classList.add('active');

    // 3. (중요) 상단 헤더 텍스트 변경
    const headerText = document.getElementById('current-tab-title');
    if (headerText) headerText.innerText = t.toUpperCase();

    // 4. (중요) 탭 이동 후 드롭다운 메뉴 자동으로 닫기
    const navMenu = document.getElementById('nav-menu'); // HTML에서 만든 메뉴 ID
    if (navMenu) navMenu.classList.remove('show');

    // 5. 갓챠 탭 전용 로직
    if(t === 'gatcha') {
        document.getElementById('gatcha-canvas-container').classList.remove('hidden');
        initGatchaPhysics();
    } else {
        exitGatchaMode();
        document.getElementById('gatcha-canvas-container').classList.add('hidden');
    }
}

        function resetWriteView() {
            currentAudio.pause();
            document.getElementById('diary').value = "";
            document.getElementById('display-title').innerText = "";
            document.getElementById('display-artist').innerText = "";
            document.getElementById('display-title').removeAttribute('data-info');
            document.getElementById('search-bar').value = "";
            document.getElementById('search-list').classList.add('hidden');
            document.getElementById('stamp-slot').innerHTML = '<div class="w-24 h-24 border-2 border-dashed border-black/10 rounded-full flex items-center justify-center text-[10px] opacity-20 text-center">SELECT<br>MUSIC</div>';
        }

        function seal() {
            const infoEl = document.getElementById('display-title');
            if(!infoEl.dataset.info) { showToast("음악을 선택해주세요!"); return; }
            const data = JSON.parse(infoEl.dataset.info);
            const entry = { ...data, id: Date.now(), content: document.getElementById('diary').value, date: new Date().toISOString() };
            archive.push(entry);
            if (archive.length % 3 === 0) { coins++; showToast("3번째 기록 달성!\n코인 1개를\n 획득했습니다."); } 
            else { showToast("기록이\n 저장되었습니다."); }
            const todayKey = new Date().toLocaleDateString();
            if(!dailySongs[todayKey]) dailySongs[todayKey] = entry;
            resetWriteView(); updateUI(); 
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-view'); container.innerHTML = "";
            const todayKey = new Date().toLocaleDateString();
            const todaysArchive = archive.filter(a => new Date(a.date).toLocaleDateString() === todayKey);
            const grouped = todaysArchive.reduce((acc, curr) => {
                const key = curr.title + curr.artist;
                if(!acc[key]) acc[key] = { ...curr, count: 1 }; else acc[key].count++;
                return acc;
            }, {});
            Object.values(grouped).forEach(item => {
                const card = document.createElement('div');
                card.className = `timeline-card ${item.count > 1 ? 'size-large' : 'size-normal'} shadow-sm`;
                const isPicked = dailySongs[todayKey] && dailySongs[todayKey].title === item.title && dailySongs[todayKey].artist === item.artist;
                card.innerHTML = `<img src="${item.image}" class="w-full h-full object-cover">
                    ${item.count > 1 ? `<div class="absolute bottom-1 right-1 bg-black/60 text-white text-[8px] px-1.5 py-0.5 font-bold">${item.count}</div>` : ''}
                    ${isPicked ? `<div class="pick-badge">PICKED</div>` : ''}`;
                
                let pressTimer;
                const startPress = () => { pressTimer = setTimeout(() => { dailySongs[todayKey] = item; showToast(`오늘의 곡 변경 완료!`); updateUI(); }, 800); };
                const cancelPress = () => clearTimeout(pressTimer);
                card.onmousedown = startPress; card.onmouseup = cancelPress;
                card.ontouchstart = startPress; card.ontouchend = cancelPress;
                card.onclick = () => showTimelineInfo(item,false);
                container.appendChild(card);
            });
        }

        function showTimelineInfo(item, fromMonthList = false) {
            document.getElementById('info-image').style.backgroundImage = `url(${item.image})`;
            document.getElementById('info-title').innerText = item.title;
            document.getElementById('info-artist').innerText = item.artist;
            const history = archive.filter(a => a.title === item.title && a.artist === item.artist).sort((a,b) => new Date(b.date) - new Date(a.date));
            document.getElementById('info-history').innerHTML = history.map(h => `<div class="mb-4 border-l-2 border-black pl-3 py-1"><div class="text-[9px] font-bold opacity-30 uppercase tracking-tighter">${new Date(h.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} • ${new Date(h.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div><div class="mt-1 leading-relaxed text-black">${h.content || "..."}</div></div>`).join('');
            
            const backBtn = document.querySelector('#info-popup button'); // 버튼의 클릭 이벤트를 상황에 맞게 재설정
            if(fromMonthList){
                const monthPopup = document.getElementById('month-list-popup');
                if(monthPopup){
                    monthPopup.classList.remove('show');
                    monthPopup.style.display = 'none';}
                backBtn.onclick () =>{
                    closeInfo();
                    if(monthPopup){
                        monthPopup.classList.add('show');
                        monthPopup.style.display = 'flex';}
                };
                backBtn.innerText = "BACK TO LIST";}
            else{
                backBtn.onclick = closeInfo;
                backBtn.innerText = "BACK";}
            
            toggleModalOverlay(true); document.getElementById('info-popup').classList.add('show');
            currentAudio.src = item.url; currentAudio.loop = true;
            currentAudio.play();
        }
        function backToMonthList(){
            document.getElementById('info-popup').classList.remove('show');
            currentAudio.pause();
            document.getElementById('month-list-popup').classList.add('show');}
        
        function closeInfo() { document.getElementById('info-popup').classList.remove('show'); toggleModalOverlay(false); currentAudio.pause(); }
        
       function toggleTimeline() {
    isTimelineOpen = !isTimelineOpen;
    const streamContainer = document.getElementById('static-stream');
    const timelineView = document.getElementById('timeline-view');

    if (isTimelineOpen) {
        streamContainer.classList.add('slide-down');
        // 연력이 내려올 때 타임라인을 살짝 투명하게 하거나 숨길 수 있습니다.
        timelineView.style.opacity = "0.3"; 
    } else {
        streamContainer.classList.remove('slide-down');
        timelineView.style.opacity = "1";
    }
}
        
        function renderStaticStream() {
            const container = document.getElementById('static-stream');
            container.innerHTML = ""; // 기존 내용 비우기

            // 1. 전체를 감싸는 흰색 카드(박스) 생성
            const contentCard = document.createElement('div');
            contentCard.className = 'stream-content-card';
    
    // 2. 2026 타이틀 생성 (불필요한 STREAM 글자 없이 2026만)
    const yearTitle = document.createElement('div');
    yearTitle.className = 'stream-year-title';
    yearTitle.innerText = "2026";
    contentCard.appendChild(yearTitle);

    // 3. 월별 행들을 담을 컨테이너 생성 (flex-grow로 꽉 채우기 위함)
    const rowsContainer = document.createElement('div');
    rowsContainer.id = 'stream-rows-container';
    rowsContainer.style.flex = "1";
    rowsContainer.style.display = "flex";
    rowsContainer.style.flexDirection = "column";
    rowsContainer.style.justifyContent = "space-between";
    rowsContainer.style.gap = "2px";
    
    const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
    
    months.forEach((mName, i) => {
        const row = document.createElement('div'); 
        row.className = "month-row"; 
        
        // 월 이름 박스
        const monthBox = document.createElement('div');
        monthBox.className = "month-box";
        monthBox.innerText = mName;
        monthBox.onclick = () => showMonthList(i, mName);
        row.appendChild(monthBox);

        // 그리드 생성
        const grid = document.createElement('div'); 
        grid.className = "day-grid";
        
        const daysInMonth = new Date(2026, i + 1, 0).getDate();
        for(let d=1; d<=daysInMonth; d++) {
            const dot = document.createElement('div'); 
            dot.className = "day-pixel";
            const key = new Date(2026, i, d).toLocaleDateString();
            if(dailySongs[key]) dot.style.background = dailySongs[key].color;
            grid.appendChild(dot);
        }
        
        row.appendChild(grid); 
        rowsContainer.appendChild(row);
    });

    contentCard.appendChild(rowsContainer);
    container.appendChild(contentCard);
}

        function showMonthList(monthIdx, monthName) {
            const listContent = document.getElementById('month-list-content');
            listContent.innerHTML = "";
            document.getElementById('month-list-title').innerText = `2026 ${monthName} `;
            const picked = [];
            for (let key in dailySongs) {
                const d = new Date(key);
                if (d.getFullYear() === 2026 && d.getMonth() === monthIdx) picked.push({ date: key, ...dailySongs[key] });
            }
            picked.sort((a,b) => new Date(a.date) - new Date(b.date));
            if(picked.length === 0) listContent.innerHTML = "<div class='text-center opacity-30 py-10 text-[11px]'>NO DAILY PICKS</div>";
            else {
                picked.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "flex items-center gap-4 mb-4 p-3 bg-white rounded-2xl shadow-sm border border-black/5 active:scale-95 transition-transform cursor-pointer";
                    div.innerHTML = `
                        <div class="text-[12px] font-bold mt-1 opacity-20 text-black">${new Date(item.date).toLocaleDateString()}</div>
                        <img src="${item.image}" class="w-12 h-12 rounded-full object-cover shadow-md">    
                           
                        <div class="flex-1 min-w-0">
                            <div class="text-[10px] opacity-40 italic text-black">${item.artist}</div>
                             <div class="font-bold text-[12px] uppercase truncate text-black">${item.title}</div>
                        </div>`;
                    div.onclick = () => { showTimelineInfo(item); };
                    listContent.appendChild(div);
                });
            }
            toggleModalOverlay(true); document.getElementById('month-list-popup').classList.add('show');
        }
        function closeMonthList() { document.getElementById('month-list-popup').classList.remove('show'); toggleModalOverlay(false); }

        function startGatchaSession() {
            if(archive.length === 0) { showToast("기록을 먼저 작성해주세요!"); return; }
            if(coins <= 0) { showToast("코인이 부족합니다!"); return; }
            coins--; updateUI();
            isGatchaActive = true;
            document.getElementById('main-container').classList.add('gatcha-active');
            const canvasContainer = document.getElementById('gatcha-canvas-container');
            canvasContainer.style.zIndex = "70"; canvasContainer.style.pointerEvents = "auto";
            document.getElementById('coin-btn').style.display = 'none';
            document.getElementById('gatcha-guide').classList.remove('opacity-0');
            document.getElementById('gatcha-blur-bg').style.pointerEvents = "auto";
        }

        function exitGatchaMode() {
            isGatchaActive = false; document.getElementById('main-container').classList.remove('gatcha-active');
            const canvasContainer = document.getElementById('gatcha-canvas-container');
            canvasContainer.style.zIndex = "10"; canvasContainer.style.pointerEvents = "none";
            document.getElementById('coin-btn').style.display = 'block';
            document.getElementById('gatcha-guide').classList.add('opacity-0');
            document.getElementById('gatcha-blur-bg').style.pointerEvents = "none";
        }

        function showGatchaResult(data) {
            currentAudio.src = data.url; 
            currentAudio.play().catch(() => {});
            document.getElementById('res-image').style.backgroundImage = `url(${data.image})`;
            document.getElementById('res-title').innerText = data.title;
            document.getElementById('res-artist').innerText = data.artist || "";
            document.getElementById('res-content').innerText = data.content || "...";
            const d = new Date(data.date);
            document.getElementById('res-datetime').innerText = `${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false})}`;
            toggleModalOverlay(true); document.getElementById('result-popup').classList.add('show');
            document.getElementById('gatcha-canvas-container').style.pointerEvents = "none";
        }

        function closeResultPopup() { 
            document.getElementById('result-popup').classList.remove('show'); 
            toggleModalOverlay(false); 
            exitGatchaMode(); 
            currentAudio.pause(); 
            initGatchaPhysics(); 
        }
        let isCoolingDown = false;

        function setupShakeInteraction() {
            let lastX = 0;
            let lastAccX = 0, lastAccY =0, lastAccZ = 0;
            const SHAKE_THRESHOLD = 15; // 흔들림 감도( 숫자가 낮을수록 예민함)
            window.addEventListener('mousemove', (e) => {
                if(!isGatchaActive || document.querySelector('.popup-base.show')) return;
                if(Math.abs(e.clientX - lastX) > 60) {
                    Composite.allBodies(engine.world).forEach(body => {
                        if(body.label === "item") {
                            Body.applyForce(body, body.position, { x: (Math.random()-0.5)*0.02, y: -Math.random()*0.05 });
                        }
                    });
                }
                lastX = e.clientX;
            });

            //모바일용 흔들기
            window.addEventListener('devicemotion',(event) => {
                if(!isGatchaActive || document.querySelector('.popup-base.show') || isCoolingDown) return;

                const acc = event.accelerationIncludingGravity;
                if(!acc) return;

                //이전 값과의 차이 계산(변화량)
                let delta = Math.abs(acc.x - lastAccX) + Math.abs(acc.y -lastAccY) + Math.abs(acc.z -lastAccZ);

                if (delta > SHAKE_THRESHOLD){
                    applyShakerForce();
                }
                lastAccX = acc.x;
                lastAccY = acc.y;
                lastAccZ = acc.z;
        });
        }
            //힘을 가하는 로직 공통화
        function applyShakerForce(){
            isCoolingDown = true;
            Composite.allBodies(engine.world).forEach(body =>{
                if(body.label == "item"){
                    Body.applyForce(body, body.position, {
                        x: (Math.random() -0.5)*0.05,
                        y: -Math.random()*0.08
                        });
                    }
                });
                setTimeout(()=>{
                    isCoolingDown = false;},500);}

        // 초기화
        let searchTimer;
        document.getElementById('search-bar').addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(searchMusic, 200);
        });
