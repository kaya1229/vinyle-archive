<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vinyl Archive 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        :root { --paper: #fdf8ef; --nav-bg: #1a1a1a; }
        body { font-family: 'Courier Prime', monospace; background-color: #000; margin: 0; min-height: 100vh; overflow: hidden; }
        .app-container { width: 100%; height: 100vh; background-color: var(--paper); position: relative; display: flex; flex-direction: column; }
        .tab-view { display: none; flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .tab-view.active { display: flex; flex-direction: column; }
        #search-list { position: absolute; top: 100%; left: 0; width: 100%; z-index: 1000; background: white; border: 2px solid black; border-radius: 12px; max-height: 250px; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .nav-bar { height: 100px; background: var(--nav-bg); display: flex; justify-content: space-around; align-items: center; position: absolute; bottom: 0; width: 100%; z-index: 500; }
        .lp-circle { width: 46px; height: 46px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; color: white; border: 1px solid #333; transition: 0.3s; }
        .tab-btn.active .lp-circle { background: #fff; color: black; transform: scale(1.1); }
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .popup-base { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; background: var(--paper); padding: 25px; border: 2px solid #000; width: 320px; border-radius: 24px; display: none; flex-direction: column; box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
        .show { display: flex !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="h-20 p-6 flex justify-between items-center z-50">
            <span class="text-[14px] font-bold tracking-[3px]" id="header-text">WRITE</span>
            <div class="text-[11px] font-bold border-2 border-black px-4 py-1 rounded-full bg-white">🪙 <span id="coin-count">0</span></div>
        </div>

        <div id="view-write" class="tab-view active">
            <div class="relative w-full mb-6">
                <input type="text" id="search-bar" placeholder="Search Music..." class="w-full bg-transparent border-b-2 border-black p-2 outline-none text-[14px] italic">
                <div id="search-list" class="hidden"></div>
            </div>
            
            <div class="bg-white rounded-[32px] p-6 flex flex-col shadow-inner flex-1 mb-4" style="min-height: 350px;">
                <div id="stamp-slot" class="mb-4 flex justify-center items-center h-28">
                    <div class="w-24 h-24 border-2 border-dashed border-black/10 rounded-full flex items-center justify-center text-[10px] opacity-20 text-center uppercase">Music<br>Disc</div>
                </div>
                <div id="song-info" class="text-center mb-4">
                    <div id="display-title" class="text-[16px] font-bold uppercase truncate"></div>
                    <div id="display-artist" class="text-[11px] opacity-40 italic truncate"></div>
                </div>
                <textarea id="diary" placeholder="Today's thought..." class="w-full flex-1 bg-transparent outline-none resize-none text-[15px] border-t pt-4"></textarea>
            </div>
            <button onclick="sealRecord()" class="w-full py-4 bg-black text-white rounded-full font-bold text-[12px] tracking-widest">SEAL RECORD</button>
        </div>

        <div id="view-gatcha" class="tab-view" style="padding:0; overflow:hidden;">
            <div id="gatcha-ui" class="absolute inset-0 flex items-center justify-center z-20">
                <button onclick="startGatcha()" class="bg-black text-white px-8 py-4 text-[12px] font-bold tracking-[4px] rounded-full shadow-2xl">⬙ INSERT COIN</button>
            </div>
            <div id="canvas-container" class="absolute inset-0 pointer-events-none"></div>
        </div>

        <div class="nav-bar">
            <button onclick="changeTab('write')" class="tab-btn active" id="btn-write"><div class="lp-circle"><span>✎</span></div></button>
            <button onclick="changeTab('gatcha')" class="tab-btn" id="btn-gatcha"><div class="lp-circle"><span>⬙</span></div></button>
        </div>

        <div id="result-popup" class="popup-base">
            <div class="w-32 h-32 mx-auto mb-4 rounded-full overflow-hidden border-2 border-black">
                <img id="res-image" src="" class="w-full h-full object-cover animate-spin-slow">
            </div>
            <div id="res-title" class="text-center font-bold text-[15px]"></div>
            <div id="res-artist" class="text-center text-[11px] opacity-40 mb-4"></div>
            <div id="res-content" class="text-center text-[12px] opacity-70 bg-black/5 p-3 rounded-xl max-h-24 overflow-y-auto"></div>
            <button onclick="closePopup()" class="w-full py-4 bg-black text-white rounded-full font-bold mt-6 text-[11px]">CONFIRM</button>
        </div>
    </div>

    <script>
        let archive = JSON.parse(localStorage.getItem('myArchive')) || [];
        let coins = parseInt(localStorage.getItem('myCoins')) || 0;
        let selectedSong = null;
        let engine, render, runner;

        // 1. iTunes API 연동 (JSONP 방식 - GitHub Pages 최적화)
        function searchMusic() {
            const query = document.getElementById('search-bar').value.trim();
            if (query.length < 2) return;

            // 기존 스크립트 삭제
            const oldScript = document.getElementById('itunes-script');
            if (oldScript) oldScript.remove();

            // JSONP 호출
            const script = document.createElement('script');
            script.id = 'itunes-script';
            script.src = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=5&callback=handleResponse`;
            document.body.appendChild(script);
        }

        function handleResponse(data) {
            const list = document.getElementById('search-list');
            list.innerHTML = "";
            if (data.results && data.results.length > 0) {
                list.classList.remove('hidden');
                data.results.forEach(track => {
                    const div = document.createElement('div');
                    div.className = "p-4 border-b hover:bg-gray-50 flex items-center gap-3 cursor-pointer";
                    div.innerHTML = `
                        <img src="${track.artworkUrl60}" class="w-10 h-10 rounded shadow-sm">
                        <div class="overflow-hidden">
                            <div class="font-bold text-[11px] truncate">${track.trackName}</div>
                            <div class="text-[10px] opacity-40 truncate">${track.artistName}</div>
                        </div>`;
                    div.onclick = () => {
                        selectedSong = {
                            title: track.trackName,
                            artist: track.artistName,
                            image: track.artworkUrl100.replace('100x100bb', '400x400bb'),
                            color: `hsl(${Math.random() * 360}, 50%, 70%)`
                        };
                        displaySelected();
                        list.classList.add('hidden');
                    };
                    list.appendChild(div);
                });
            }
        }

        function displaySelected() {
            document.getElementById('display-title').innerText = selectedSong.title;
            document.getElementById('display-artist').innerText = selectedSong.artist;
            document.getElementById('stamp-slot').innerHTML = `<img src="${selectedSong.image}" class="w-24 h-24 rounded-full animate-spin-slow object-cover border-2 border-black">`;
        }

        // 2. 물리 엔진 & 랜덤 도형 갓챠
        function initPhysics() {
            const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Events } = Matter;
            if (engine) { Composite.clear(engine.world); Engine.clear(engine); Render.stop(render); Runner.stop(runner); }
            
            const container = document.getElementById('canvas-container');
            container.innerHTML = "";
            const cw = container.clientWidth, ch = container.clientHeight;

            engine = Engine.create();
            render = Render.create({ element: container, engine: engine, options: { width: cw, height: ch, background: 'transparent', wireframes: false } });

            // 벽 생성
            const wallOpts = { isStatic: true, render: { visible: false } };
            Composite.add(engine.world, [
                Bodies.rectangle(cw/2, ch+10, cw, 20, wallOpts),
                Bodies.rectangle(-10, ch/2, 20, ch, wallOpts),
                Bodies.rectangle(cw+10, ch/2, 20, ch, wallOpts)
            ]);

            // 랜덤 도형 생성 (기록된 데이터 기반)
            const shapes = archive.map(item => {
                const x = Math.random() * (cw - 60) + 30;
                const type = Math.floor(Math.random() * 3); // 0:원, 1:사각, 2:삼각
                const opts = { restitution: 0.5, render: { fillStyle: item.color } };
                let body;
                if(type === 0) body = Bodies.circle(x, -100, 25, opts);
                else if(type === 1) body = Bodies.rectangle(x, -100, 45, 45, opts);
                else body = Bodies.polygon(x, -100, 3, 30, opts);
                
                body.songData = item;
                return body;
            });

            Composite.add(engine.world, shapes);

            const mouse = Mouse.create(render.canvas);
            const mc = MouseConstraint.create(engine, { mouse: mouse, constraint: { stiffness: 0.1, render: { visible: false } } });
            Composite.add(engine.world, mc);

            Events.on(mc, 'mousedown', (e) => {
                const body = e.source.body;
                if(body && body.songData) showResult(body.songData);
            });

            runner = Runner.create();
            Runner.run(runner, engine);
            Render.run(render);
        }

        // 3. UI 및 저장 로직
        function sealRecord() {
            const diary = document.getElementById('diary').value;
            if(!selectedSong) { alert("노래를 검색해 주세요!"); return; }
            
            const newEntry = { ...selectedSong, content: diary, date: new Date().toISOString() };
            archive.push(newEntry);
            coins++;
            saveData();
            alert("기록이 봉인되었습니다! (+1 🪙)");
            location.reload(); 
        }

        function startGatcha() {
            if(coins <= 0) { alert("코인이 부족합니다!"); return; }
            if(archive.length === 0) { alert("기록이 없습니다!"); return; }
            coins--;
            saveData();
            document.getElementById('coin-count').innerText = coins;
            document.getElementById('gatcha-ui').style.display = 'none';
            document.getElementById('canvas-container').style.pointerEvents = 'auto';
            initPhysics();
        }

        function showResult(data) {
            document.getElementById('res-image').src = data.image;
            document.getElementById('res-title').innerText = data.title;
            document.getElementById('res-artist').innerText = data.artist;
            document.getElementById('res-content').innerText = data.content || "기록된 생각이 없습니다.";
            document.getElementById('result-popup').classList.add('show');
        }

        function closePopup() { document.getElementById('result-popup').classList.remove('show'); }

        function changeTab(t) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            document.getElementById('btn-'+t).classList.add('active');
            document.getElementById('header-text').innerText = t.toUpperCase();
        }

        function saveData() {
            localStorage.setItem('myArchive', JSON.stringify(archive));
            localStorage.setItem('myCoins', coins);
        }

        // Event Listeners
        let searchTimer;
        document.getElementById('search-bar').addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(searchMusic, 600);
        });

        document.getElementById('coin-count').innerText = coins;
    </script>
</body>
</html>
