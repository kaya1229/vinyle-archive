<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vinyl Archive 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        :root { --paper: #fdf8ef; --nav-bg: #1a1a1a; --vintage-dark: #2c2c2c; }
        
        body { 
            font-family: 'Courier Prime', monospace; 
            background-color: #000; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-container { 
            width: 100%; max-width: none; height: 100vh; 
            background-color: var(--paper); border: none; border-radius: 0; 
            position: relative; overflow: hidden; display: flex; flex-direction: column; 
        }
        
        * { -ms-overflow-style: none; scrollbar-width: none; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }

        textarea, input { -webkit-user-select: text !important; user-select: text !important; }

        /* Floating Menu System */
        #floating-lp-container {
            position: absolute;
            bottom: 40px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            gap: 15px;
            touch-action: none;
        }

        .lp-main-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 2px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: grab;
            z-index: 2001;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .lp-main-btn:active { cursor: grabbing; transform: scale(0.9); }

        .lp-design {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 18%, transparent 19%), 
                        repeating-radial-gradient(circle, #333 0, #333 1px, #1a1a1a 2px, #1a1a1a 3px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .sub-menu-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            opacity: 0;
            transform: translateY(20px) scale(0.8);
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .sub-menu-container.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .sub-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            border: 2px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        .sub-btn.active { background: #000; color: #fff; transform: scale(1.1); }

        /* 기존 컴포넌트 스타일 유지 */
        #toast-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 4000; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
        .toast { background: rgba(0, 0, 0, 0.9); color: #fff; padding: 16px 28px; border-radius: 10px; font-size: 12px; font-weight: bold; text-align: center; line-height: 1.5; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(5px); opacity: 0; transform: scale(0.9); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast.show { opacity: 1; transform: scale(1); }
        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 2500; display: none; pointer-events: auto; }
        .modal-overlay.active { display: block; }
        #gatcha-canvas-container { transition: filter 0.5s ease; }
        .gatcha-active #gatcha-canvas-container { filter: blur(20px); }
        #gatcha-blur-bg { position: absolute; inset: 0; z-index: 60; background: rgba(253, 248, 239, 0); transition: all 0.5s ease; pointer-events: none; }
        .gatcha-active #gatcha-blur-bg { background: rgba(253, 248, 239, 0.4); pointer-events: auto; }
        .tab-view { display: none; flex: 1; width: 100%; height: calc(100% - 80px); position: absolute; top: 80px; left: 0; padding: 20px; overflow-y: scroll; z-index: 50; }
        .tab-view.active { display: flex; flex-direction: column; }
        .write-btn-container { display: flex; justify-content: center; gap : 16px; margin-top: 60px; margin-bottom: 80px; }
        #view-album { padding: 0; overflow: hidden; }
        #timeline-view { position: absolute; inset: 0; background: var(--paper); z-index: 10; padding: 20px; display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: min-content; gap: 8px; overflow-y: auto; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .timeline-card { overflow: hidden; cursor: pointer; background: #fff; position: relative; aspect-ratio: 1/1; border-radius: 0; transition: transform 0.1s; }
        .size-large { grid-column: span 2; grid-row: span 2; }
        .popup-base { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 3500; background: var(--paper); padding: 25px; border: 2px solid #000; width: 350px; max-height: 550px; display: none; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); flex-direction: column; }
        .show { display: flex !important; }
        .auto-scroll { flex: 1; overflow-y: auto; padding-right: 5px; margin-top: 10px; }
        .animate-spin-slow { animation: spin 12s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .stream-container { background-color: transparent !important; padding: 12px; padding-top: env(safe-area-inset-top, 10px); padding-bottom: 120px; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; z-index: 600; transform: translateY(-100%); transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden !important; }
        .stream-content-card{ background-color: #ffffff; border-radius: 24px; padding: 20px 15px; height: 100%; display: flex; flex-direction: column; }
        .stream-year-title { font-size: 24px; font-weight: 900; color: #000; margin-bottom: 15px; letter-spacing: -1.5px; }
        .stream-container.slide-down { transform: translateY(0) !important; }
        .timeline-up { transform: translateY(-100%); }
        .month-row { display: flex; align-items: center; gap: 8px; width: 100%; flex: 1; min-height: 0; }
        .month-box { font-size: 11px; font-weight: 800; width: 45px; height: 80%; max-height: 30px; display: flex; align-items: center; justify-content: center; background: #eee5d5; border-radius: 4px; cursor: pointer; flex-shrink: 0; }
        .day-grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 2px; flex: 1; height: 100%; align-items: center; padding-left: 8px; border-left: 1px solid #eee; }
        .day-pixel { aspect-ratio:1 / 1; width: 100%; height: 8px; background: rgba(0,0,0,0.05); border-radius: 1px; }
        .pick-badge { position: absolute; top: 0; left: 0; background: #000; color: #fff; font-size: 8px; font-weight: 900; padding: 2px 5px; z-index: 5; }
    </style>
</head>
<body>

    <div class="app-container" id="main-container">
        <div id="toast-container"></div>
        <div id="modal-overlay" class="modal-overlay"></div>
        <div id="gatcha-blur-bg"></div>
        <div id="gatcha-canvas-container" class="absolute inset-0 pointer-events-none z-10 hidden"></div>

        <div class="app-header h-20 p-6 flex justify-between items-center z-[100]">
            <span class="text-[14px] font-bold tracking-[3px]" id="header-text">WRITE</span>
            <div class="flex items-center gap-2">
                <div class="text-[11px] font-bold border-2 border-black px-4 py-1 rounded-full bg-white">🪙 <span id="coin-count">0</span></div>
                <button onclick="openSettings()" class="w-7 h-7 flex items-center justify-center bg-white border-2 border-black rounded-full text-[14px] hover:bg-black hover:text-white transition-colors">⁝</button>
            </div>
        </div>

        <div id="view-write" class="tab-view active">
            <div id="top-datetime-display" class="text-center font-bold mb-4 text-[13px] opacity-60"></div>
            <div class="relative w-full mb-6">
                <input type="text" id="search-bar" placeholder="Search music..." class="w-full bg-transparent border-b-2 border-black p-2 outline-none text-[13px] italic">
                <div id="search-list" class="hidden absolute top-full left-0 w-full border-2 border-black bg-white z-[110] rounded-xl shadow-2xl mt-1"></div>
            </div>
            <div class="bg-white rounded-[24px] h-[380px] p-6 flex flex-col shadow-inner">
                <div id="stamp-slot" class="mb-4 flex justify-center items-center h-28">
                    <div class="w-24 h-24 border-2 border-dashed border-black/10 rounded-full flex items-center justify-center text-[10px] opacity-20 text-center">SELECT<br>MUSIC</div>
                </div>
                <div id="song-info" class="text-center mb-4">
                    <div id="display-title" class="text-[16px] font-bold uppercase truncate"></div>
                    <div id="display-artist" class="text-[11px] opacity-40 italic truncate"></div>
                </div>
                <textarea id="diary" placeholder="Write down your thoughts..." class="w-full flex-1 bg-transparent outline-none resize-none text-[15px] border-t pt-4"></textarea>
            </div>
            <div class="write-btn-container">
                <button onclick="seal()" class="w-5/12 py-3 bg-black text-white rounded-full font-bold text-[11px]">SEAL RECORD</button>
                <button onclick="resetWriteView()" class="w-5/12 py-3 border-2 border-black text-black rounded-full font-bold text-[11px]">RESET</button>
            </div>
        </div>

        <div id="view-album" class="tab-view" style="padding: 0; overflow: hidden; height: 100vh;">
            <div class="px-6 flex justify-between items-center h-20" id="album-header-ui">
                <span id="album-main-title" class="text-[22px] font-black uppercase tracking-tighter">Today's TIMELINE</span>
            </div>
            <div class="album-content-wrapper" id="swipe-area" style="position: relative; height: calc(100% - 80px); overflow: hidden;">
                <div id="timeline-view"></div>
                <div id="static-stream" class="stream-container"></div>
                <div class="absolute bottom-5 left-1/2 -translate-x-1/2 text-[10px] font-black opacity-20 pointer-events-none z-30">↑ SWIPE UP TO STREAM</div>
            </div>
        </div>

        <div id="view-gatcha" class="tab-view" style="padding:0; overflow:hidden;">
            <div id="gatcha-guide" class="absolute top-20 w-full text-center font-bold text-[12px] tracking-widest z-[70] opacity-0 transition-opacity pointer-events-none">SHAKE & CLICK!</div>
            <div id="gatcha-ui" class="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
                <button id="coin-btn" onclick="startGatchaSession()" class="pointer-events-auto bg-black text-white px-8 py-4 text-[12px] font-bold tracking-[4px] rounded-full mb-[300px] shadow-2xl">⬙ INSERT COIN</button>
            </div>
        </div>

        <div id="floating-lp-container">
            <div class="sub-menu-container" id="sub-menu">
                <button onclick="changeTab('gatcha')" class="sub-btn" id="sub-btn-gatcha">⬙</button>
                <button onclick="changeTab('album')" class="sub-btn" id="sub-btn-album">▤</button>
                <button onclick="changeTab('write')" class="sub-btn active" id="sub-btn-write">✎</button>
            </div>
            <div class="lp-main-btn animate-spin-slow" id="lp-handle" onclick="toggleMenu()">
                <div class="lp-design">💿</div>
            </div>
        </div>

        <div id="settings-popup" class="popup-base">
            <h2 class="text-[16px] font-bold text-center pb-3 uppercase tracking-wider border-b-2 border-black/5 mb-6">Settings</h2>
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-center px-2">
                    <span class="text-[12px] font-bold">Storage Management</span>
                    <button onclick="clearArchive()" class="px-4 py-2 bg-red-50 text-red-600 border border-red-200 rounded-lg font-bold text-[10px]">CLEAR ALL DATA</button>
                </div>
            </div>
            <button onclick="closeSettings()" class="w-full py-4 bg-black text-white rounded-full font-bold mt-8">CLOSE</button>
        </div>

        <div id="result-popup" class="popup-base">
            <div class="w-32 h-32 mx-auto mb-4 rounded-full overflow-hidden border-2 border-black">
                <div id="res-image" class="w-full h-full bg-cover bg-center animate-spin-slow"></div>
            </div>
            <div id="res-title" class="text-center font-bold uppercase text-[15px] mb-1 truncate px-4"></div>
            <div id="res-artist" class="text-center text-[11px] opacity-40 italic mb-3"></div>
            <div id="res-content" class="auto-scroll text-center text-[12px] opacity-70 italic px-4 mt-2 border-t pt-4"></div>
            <div id="res-datetime" class="text-center mt-6 mb-2 text-[10px] font-bold opacity-30 tracking-widest"></div>
            <button onclick="closeResultPopup()" class="w-full py-4 bg-black text-white rounded-full font-bold">CONFIRM</button>
        </div>

        <div id="info-popup" class="popup-base">
            <div class="flex items-center gap-4 mb-4 border-b pb-4 mt-2">
                <div id="info-image" class="w-20 h-20 bg-cover bg-center shadow-md rounded-lg"></div>
                <div class="flex-1 min-w-0">
                    <div id="info-title" class="font-bold uppercase text-[15px] truncate"></div>
                    <div id="info-artist" class="text-[11px] opacity-40 italic"></div>
                </div>
            </div>
            <div id="info-history" class="auto-scroll text-[12px]"></div>
            <button onclick="closeInfo()" class="w-full py-4 bg-black text-white rounded-full font-bold mt-4">BACK</button>
        </div>

        <div id="month-list-popup" class="popup-base">
            <h2 id="month-list-title" class="text-[16px] font-bold text-center pb-3 uppercase border-b-2 border-black/5 mb-4"></h2>
            <div id="month-list-content" class="auto-scroll"></div>
            <button onclick="closeMonthList()" class="w-full py-4 bg-black text-white rounded-full font-bold mt-4">CLOSE</button>
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Mouse, MouseConstraint, Body } = Matter;
        let archive = JSON.parse(localStorage.getItem('myArchive')) || [];
        let dailySongs = JSON.parse(localStorage.getItem('dailySongs')) || {};
        let coins = (localStorage.getItem('myCoins') === null) ? 1 : parseInt(localStorage.getItem('myCoins'));
        let currentAudio = new Audio();
        let engine, runner, render, isGatchaActive = false, isTimelineOpen = false;

        window.oncontextmenu = function(e) { e.preventDefault(); e.stopPropagation(); return false; };

        // 1. Floating Menu Drag & Interaction
        const lpContainer = document.getElementById('floating-lp-container');
        const lpHandle = document.getElementById('lp-handle');
        let isDragging = false, startX, startY, initialX, initialY;

        lpHandle.addEventListener('pointerdown', (e) => {
            isDragging = false;
            startX = e.clientX; startY = e.clientY;
            const rect = lpContainer.getBoundingClientRect();
            initialX = rect.left; initialY = rect.top;
            lpHandle.setPointerCapture(e.pointerId);
        });

        lpHandle.addEventListener('pointermove', (e) => {
            if (!startX) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                isDragging = true;
                lpContainer.style.left = `${initialX + dx}px`;
                lpContainer.style.top = `${initialY + dy}px`;
                lpContainer.style.bottom = 'auto'; lpContainer.style.right = 'auto';
            }
        });

        lpHandle.addEventListener('pointerup', () => { startX = null; });

        function toggleMenu() {
            if (isDragging) return;
            document.getElementById('sub-menu').classList.toggle('open');
        }

        function changeTab(t) {
            if(isGatchaActive) { showToast("먼저 갓챠를 완료해주세요!"); return; }
            currentAudio.pause();
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            document.getElementById('sub-btn-'+t).classList.add('active');
            document.getElementById('header-text').innerText = t.toUpperCase();
            document.getElementById('sub-menu').classList.remove('open');
            if(t === 'gatcha') {
                document.getElementById('gatcha-canvas-container').classList.remove('hidden');
                initGatchaPhysics();
            } else {
                exitGatchaMode();
                document.getElementById('gatcha-canvas-container').classList.add('hidden');
            }
        }

        // 2. Music Search (iTunes API)
        function searchMusic() {
            const query = document.getElementById('search-bar').value.trim();
            if (query.length < 2) { document.getElementById('search-list').classList.add('hidden'); return; }
            const oldScript = document.getElementById('itunes-script');
            if (oldScript) oldScript.remove();
            const script = document.createElement('script');
            script.id = 'itunes-script';
            script.src = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=5&callback=handleITunesResponse`;
            document.body.appendChild(script);
        }

        window.handleITunesResponse = function(data) {
            const list = document.getElementById('search-list');
            list.innerHTML = "";
            if (data.results && data.results.length > 0) {
                list.classList.remove('hidden');
                data.results.forEach(track => {
                    const div = document.createElement('div');
                    div.className = "p-4 cursor-pointer border-b hover:bg-gray-50 flex items-center gap-3";
                    const artwork = track.artworkUrl100.replace('100x100bb', '400x400bb');
                    div.innerHTML = `<img src="${track.artworkUrl60}" class="w-10 h-10 rounded shadow-sm"><div class="overflow-hidden"><div class="font-bold text-[11px] truncate text-black">${track.trackName}</div><div class="text-[10px] opacity-40 truncate text-black">${track.artistName}</div></div>`;
                    div.onclick = () => pickMusic(track.trackName, track.artistName, artwork, track.previewUrl);
                    list.appendChild(div);
                });
            }
        };

        function pickMusic(t, a, i, u) {
            const el = document.getElementById('display-title');
            el.dataset.info = JSON.stringify({ title: t, artist: a, image: i, color: `hsl(${Math.random() * 360}, 50%, 70%)`, url: u });
            el.innerText = t; 
            document.getElementById('display-artist').innerText = a;
            document.getElementById('stamp-slot').innerHTML = `<img src="${i}" class="w-24 h-24 rounded-full animate-spin-slow object-cover border-2 border-black">`;
            document.getElementById('search-list').classList.add('hidden');
            document.getElementById('search-bar').value = "";
            currentAudio.src = u; currentAudio.play().catch(() => showToast("미리듣기 재생 불가"));
        }

        // 3. Matter.js Gatcha
        function initGatchaPhysics() {
            if (engine) { Composite.clear(engine.world); Engine.clear(engine); Render.stop(render); Runner.stop(runner); }
            const container = document.getElementById('gatcha-canvas-container');
            container.innerHTML = "";
            const cw = container.clientWidth, ch = container.clientHeight;
            engine = Engine.create();
            render = Render.create({ element: container, engine: engine, options: { width: cw, height: ch, background: 'transparent', wireframes: false } });
            const wallOpts = { isStatic: true, render: { visible: false } };
            Composite.add(engine.world, [Bodies.rectangle(cw/2, ch-90, cw, 20, wallOpts), Bodies.rectangle(-10, ch/2, 20, ch, wallOpts), Bodies.rectangle(cw+10, ch/2, 20, ch, wallOpts)]);
            const shapes = archive.map(item => {
                const x = Math.random() * (cw - 60) + 30;
                const type = Math.floor(Math.random() * 3);
                const opts = { restitution: 0.6, render: { fillStyle: item.color || '#000' }, label: "item" };
                let body = type === 0 ? Bodies.circle(x, -100, 20, opts) : type === 1 ? Bodies.rectangle(x, -100, 40, 40, opts) : Bodies.polygon(x, -100, 3, 25, opts);
                body.songData = item; return body;
            });
            Composite.add(engine.world, shapes);
            const mouse = Mouse.create(render.canvas), mouseConstraint = MouseConstraint.create(engine, { mouse: mouse, constraint: { stiffness: 0.2, render: { visible: false } } });
            Events.on(mouseConstraint, 'mousedown', (e) => { if(!isGatchaActive || document.querySelector('.popup-base.show')) return; const body = e.source.body; if(body && body.label === "item") showGatchaResult(body.songData); });
            Composite.add(engine.world, mouseConstraint);
            runner = Runner.create(); Runner.run(runner, engine); Render.run(render);
            setupShakeInteraction();
        }

        // 4. System Logic
        function updateUI() {
            document.getElementById('coin-count').innerText = coins;
            localStorage.setItem('myArchive', JSON.stringify(archive));
            localStorage.setItem('dailySongs', JSON.stringify(dailySongs));
            localStorage.setItem('myCoins', coins);
            renderStaticStream(); renderTimeline();
        }

        function showToast(m) {
            const c = document.getElementById('toast-container'), t = document.createElement('div');
            t.className = 'toast'; t.innerText = m; c.appendChild(t);
            setTimeout(() => t.classList.add('show'), 50);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 1200);
        }

        function seal() {
            const infoEl = document.getElementById('display-title');
            if(!infoEl.dataset.info) { showToast("음악을 선택해주세요!"); return; }
            const data = JSON.parse(infoEl.dataset.info);
            const entry = { ...data, id: Date.now(), content: document.getElementById('diary').value, date: new Date().toISOString() };
            archive.push(entry);
            if (archive.length % 3 === 0) { coins++; showToast("3번째 기록!\n코인 1개 획득"); } else { showToast("저장되었습니다."); }
            const todayKey = new Date().toLocaleDateString();
            if(!dailySongs[todayKey]) dailySongs[todayKey] = entry;
            resetWriteView(); updateUI();
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-view'); container.innerHTML = "";
            const todayKey = new Date().toLocaleDateString();
            const todaysArchive = archive.filter(a => new Date(a.date).toLocaleDateString() === todayKey);
            const grouped = todaysArchive.reduce((acc, curr) => {
                const key = curr.title + curr.artist;
                if(!acc[key]) acc[key] = { ...curr, count: 1 }; else acc[key].count++;
                return acc;
            }, {});
            Object.values(grouped).forEach(item => {
                const card = document.createElement('div');
                card.className = `timeline-card ${item.count > 1 ? 'size-large' : ''} shadow-sm`;
                const isPicked = dailySongs[todayKey] && dailySongs[todayKey].title === item.title && dailySongs[todayKey].artist === item.artist;
                card.innerHTML = `<img src="${item.image}" class="w-full h-full object-cover">${item.count > 1 ? `<div class="absolute bottom-1 right-1 bg-black/60 text-white text-[8px] px-1.5 py-0.5 font-bold">${item.count}</div>` : ''}${isPicked ? `<div class="pick-badge">PICKED</div>` : ''}`;
                card.onclick = () => showTimelineInfo(item);
                container.appendChild(card);
            });
        }

        function showTimelineInfo(item) {
            document.getElementById('info-image').style.backgroundImage = `url(${item.image})`;
            document.getElementById('info-title').innerText = item.title;
            document.getElementById('info-artist').innerText = item.artist;
            const history = archive.filter(a => a.title === item.title && a.artist === item.artist).sort((a,b) => new Date(b.date) - new Date(a.date));
            document.getElementById('info-history').innerHTML = history.map(h => `<div class="mb-4 border-l-2 border-black pl-3 py-1"><div class="text-[9px] font-bold opacity-30 uppercase">${new Date(h.date).toLocaleDateString()} • ${new Date(h.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div><div class="mt-1 leading-relaxed">${h.content || "..."}</div></div>`).join('');
            document.getElementById('modal-overlay').classList.add('active'); document.getElementById('info-popup').classList.add('show');
            currentAudio.src = item.url; currentAudio.play();
        }

        function toggleTimeline() {
            isTimelineOpen = !isTimelineOpen;
            document.getElementById('static-stream').classList.toggle('slide-down', isTimelineOpen);
            document.getElementById('timeline-view').classList.toggle('timeline-up', isTimelineOpen);
            document.getElementById('album-header-ui').style.opacity = isTimelineOpen ? "0" : "1";
        }

        function renderStaticStream() {
            const container = document.getElementById('static-stream'); container.innerHTML = "";
            const contentCard = document.createElement('div'); contentCard.className = 'stream-content-card';
            const yearTitle = document.createElement('div'); yearTitle.className = 'stream-year-title'; yearTitle.innerText = "2026";
            contentCard.appendChild(yearTitle);
            const rows = document.createElement('div'); rows.style.cssText = "flex:1; display:flex; flex-direction:column; justify-content:space-between; gap:2px;";
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            months.forEach((m, i) => {
                const row = document.createElement('div'); row.className = "month-row";
                const box = document.createElement('div'); box.className = "month-box"; box.innerText = m; box.onclick = () => showMonthList(i, m);
                const grid = document.createElement('div'); grid.className = "day-grid";
                const days = new Date(2026, i + 1, 0).getDate();
                for(let d=1; d<=days; d++) {
                    const dot = document.createElement('div'); dot.className = "day-pixel";
                    const key = new Date(2026, i, d).toLocaleDateString();
                    if(dailySongs[key]) dot.style.background = dailySongs[key].color;
                    grid.appendChild(dot);
                }
                row.append(box, grid); rows.appendChild(row);
            });
            contentCard.appendChild(rows); container.appendChild(contentCard);
        }

        function showMonthList(mIdx, mName) {
            const content = document.getElementById('month-list-content'); content.innerHTML = "";
            document.getElementById('month-list-title').innerText = `2026 ${mName}`;
            const picked = []; for(let k in dailySongs) { const d = new Date(k); if(d.getFullYear() === 2026 && d.getMonth() === mIdx) picked.push({date: k, ...dailySongs[k]}); }
            picked.sort((a,b) => new Date(b.date) - new Date(a.date));
            if(picked.length === 0) content.innerHTML = "<div class='text-center opacity-30 py-10 text-[11px]'>NO PICKS</div>";
            else picked.forEach(item => {
                const div = document.createElement('div'); div.className = "flex items-center gap-4 mb-4 p-3 bg-white rounded-2xl border border-black/5 active:scale-95 transition-transform cursor-pointer";
                div.innerHTML = `<img src="${item.image}" class="w-12 h-12 rounded-full object-cover shadow-md"><div class="flex-1 min-w-0"><div class="font-bold text-[12px] uppercase truncate">${item.title}</div><div class="text-[10px] opacity-40 italic">${item.artist}</div></div>`;
                div.onclick = () => { closeMonthList(); showTimelineInfo(item); }; content.appendChild(div);
            });
            document.getElementById('modal-overlay').classList.add('active'); document.getElementById('month-list-popup').classList.add('show');
        }

        function startGatchaSession() {
            if(archive.length === 0) { showToast("기록을 먼저 작성해주세요!"); return; }
            if(coins <= 0) { showToast("코인이 부족합니다!"); return; }
            coins--; updateUI(); isGatchaActive = true;
            document.getElementById('main-container').classList.add('gatcha-active');
            const cc = document.getElementById('gatcha-canvas-container'); cc.classList.remove('hidden'); cc.style.zIndex = "70"; cc.style.pointerEvents = "auto";
            document.getElementById('coin-btn').style.display = 'none'; document.getElementById('gatcha-guide').classList.remove('opacity-0');
        }

        function exitGatchaMode() { isGatchaActive = false; document.getElementById('main-container').classList.remove('gatcha-active'); const cc = document.getElementById('gatcha-canvas-container'); cc.style.zIndex = "10"; cc.style.pointerEvents = "none"; document.getElementById('coin-btn').style.display = 'block'; document.getElementById('gatcha-guide').classList.add('opacity-0'); }
        function showGatchaResult(d) { currentAudio.src = d.url; currentAudio.play().catch(()=>{}); document.getElementById('res-image').style.backgroundImage = `url(${d.image})`; document.getElementById('res-title').innerText = d.title; document.getElementById('res-artist').innerText = d.artist; document.getElementById('res-content').innerText = d.content || "..."; document.getElementById('res-datetime').innerText = new Date(d.date).toLocaleString(); document.getElementById('modal-overlay').classList.add('active'); document.getElementById('result-popup').classList.add('show'); }
        function closeResultPopup() { document.getElementById('result-popup').classList.remove('show'); document.getElementById('modal-overlay').classList.remove('active'); exitGatchaMode(); currentAudio.pause(); initGatchaPhysics(); }
        function closeSettings() { document.getElementById('settings-popup').classList.remove('show'); document.getElementById('modal-overlay').classList.remove('active'); }
        function openSettings() { document.getElementById('modal-overlay').classList.add('active'); document.getElementById('settings-popup').classList.add('show'); }
        function closeInfo() { document.getElementById('info-popup').classList.remove('show'); document.getElementById('modal-overlay').classList.remove('active'); currentAudio.pause(); }
        function closeMonthList() { document.getElementById('month-list-popup').classList.remove('show'); document.getElementById('modal-overlay').classList.remove('active'); }
        function clearArchive() { if(confirm("초기화하시겠습니까?")) { localStorage.clear(); location.reload(); } }
        function resetWriteView() { currentAudio.pause(); document.getElementById('diary').value = ""; document.getElementById('display-title').innerText = ""; document.getElementById('display-artist').innerText = ""; document.getElementById('display-title').removeAttribute('data-info'); document.getElementById('stamp-slot').innerHTML = '<div class="w-24 h-24 border-2 border-dashed border-black/10 rounded-full flex items-center justify-center text-[10px] opacity-20 text-center">SELECT<br>MUSIC</div>'; }

        function setupShakeInteraction() {
            let lastX = 0;
            window.addEventListener('mousemove', (e) => {
                if(!isGatchaActive || document.querySelector('.popup-base.show')) return;
                if(Math.abs(e.clientX - lastX) > 60) {
                    Composite.allBodies(engine.world).forEach(body => { if(body.label === "item") Body.applyForce(body, body.position, { x: (Math.random()-0.5)*0.02, y: -Math.random()*0.05 }); });
                }
                lastX = e.clientX;
            });
        }

        // Init
        let sTimer; document.getElementById('search-bar').addEventListener('input', () => { clearTimeout(sTimer); sTimer = setTimeout(searchMusic, 500); });
        const sArea = document.getElementById('swipe-area'); let tStart = 0;
        sArea.addEventListener('touchstart', e => { tStart = e.touches[0].clientY; }, {passive:true});
        sArea.addEventListener('touchend', e => {
            const dY = e.changedTouches[0].clientY - tStart;
            if (Math.abs(dY) > 50) { if (dY < 0 && isTimelineOpen) { if(document.getElementById('timeline-view').scrollTop <= 0) toggleTimeline(); } else if (dY > 0 && !isTimelineOpen) toggleTimeline(); }
        }, {passive:true});

        updateUI();
    </script>
</body>
</html>
